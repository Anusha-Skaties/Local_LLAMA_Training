# azure/conda_env.yml
# Conda environment for Azure ML training job.
# Used by azure/train_job.yml.

name: qlora-sft
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip:
      - torch>=2.2.0
      - transformers>=4.45.0
      - accelerate>=0.34.0
      - datasets>=2.21.0
      - trl>=0.10.1
      - peft>=0.12.0
      - bitsandbytes>=0.43.3
      - sentencepiece>=0.2.0
      - scipy>=1.11.0
      - tensorboard>=2.17.0
      - mlflow>=2.15.0
      - rouge-score>=0.1.2
      - sentence-transformers>=3.0.0
      - scikit-learn>=1.5.0
