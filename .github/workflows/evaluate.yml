name: Evaluate Fine-Tuned Model

on:
  workflow_run:
    workflows: ["SFT Training Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      max_samples:
        description: "Max samples to evaluate (leave empty for all)"
        required: false
        default: ""

concurrency:
  group: evaluate-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  AML_WORKSPACE: ${{ vars.AML_WORKSPACE }}
  AML_RESOURCE_GROUP: ${{ vars.AML_RESOURCE_GROUP }}
  AML_SUBSCRIPTION: ${{ vars.AML_SUBSCRIPTION }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}

jobs:
  # ── 1. Unit tests (no GPU, runs on GitHub free runner) ──────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install evaluation dependencies
        run: pip install -r requirements_eval.txt

      - name: Run unit tests (no GPU needed)
        run: |
          pytest evaluation_platform/tests/ \
            -v --tb=short \
            --junit-xml=reports/unit_tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: reports/unit_tests.xml

  # ── 2. Submit evaluation job to Azure ML (same GPU as training) ─────────────
  submit-eval:
    name: Submit Azure ML Eval Job
    needs: unit-tests
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AML_SUBSCRIPTION }}

      - name: Install Azure ML CLI
        run: az extension add --name ml --yes

      - name: Submit evaluation job to Azure ML
        run: |
          az ml job create \
            --file azure/eval_job.yml \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RESOURCE_GROUP" \
            --subscription "$AML_SUBSCRIPTION" \
            --set display_name="qlora-eval-$(date -u +%Y%m%dT%H%M%SZ)" \
            --set environment_variables.HF_TOKEN="${{ secrets.HF_TOKEN }}"

  # ── 3. Notify on completion ──────────────────────────────────────────────────
  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [unit-tests, submit-eval]
    if: always()

    steps:
      - name: Report outcome
        run: |
          echo "unit-tests:   ${{ needs.unit-tests.result }}"
          echo "submit-eval:  ${{ needs.submit-eval.result }}"
